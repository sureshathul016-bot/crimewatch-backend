<!DOCTYPE html><html><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>DB Viewer</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0c10;color:#e8eaf0;font-family:sans-serif}header{background:#111318;border-bottom:2px solid #e63946;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}.logo{font-size:20px;font-weight:700}.logo span{color:#e63946}.container{padding:24px;max-width:1400px;margin:0 auto}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}.stat{background:#111318;border:1px solid #1e2330;border-radius:6px;padding:18px;text-align:center}.num{font-size:36px;font-weight:700}.lbl{font-size:10px;color:#5a6070;margin-top:4px;letter-spacing:1px;text-transform:uppercase}.section{background:#111318;border:1px solid #1e2330;border-radius:6px;margin-bottom:20px;overflow:hidden}.sh{padding:14px 18px;border-bottom:1px solid #1e2330;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#5a6070;display:flex;justify-content:space-between;align-items:center}.sh span{color:#e8eaf0}.tw{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:13px}th{background:#181c24;padding:10px 14px;text-align:left;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#5a6070;border-bottom:1px solid #1e2330;white-space:nowrap}td{padding:11px 14px;border-bottom:1px solid #1e2330;vertical-align:middle}tr:last-child td{border-bottom:none}tr:hover td{background:#181c24}.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase}.bp{background:rgba(244,162,97,.15);color:#f4a261;border:1px solid rgba(244,162,97,.3)}.ba{background:rgba(46,196,182,.15);color:#2ec4b6;border:1px solid rgba(46,196,182,.3)}.br{background:rgba(230,57,70,.15);color:#ff6b6b;border:1px solid rgba(230,57,70,.3)}.btn{background:#e63946;border:none;color:#fff;padding:7px 14px;border-radius:4px;font-size:11px;cursor:pointer;letter-spacing:1px;text-transform:uppercase}.btn:hover{background:#ff6b6b}.mid{text-align:center;padding:30px;color:#5a6070;font-size:13px}.idc{font-family:monospace;font-size:12px;color:#4895ef}.dc{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#9aa0b0;font-size:12px}.nb{background:#181c24;border:1px solid #252c3a;border-radius:6px;padding:14px 18px;margin-bottom:20px}.nb h3{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#5a6070;margin-bottom:8px}.chip{background:#111318;border:1px solid #1e2330;border-radius:4px;padding:6px 14px;font-family:monospace;font-size:15px;color:#2ec4b6;display:inline-block}@media(max-width:600px){.stats{grid-template-columns:1fr 1fr}}</style></head><body><header><div class="logo">Crime<span>Watch</span> <small style="font-size:13px;color:#5a6070;font-weight:400">Database Viewer</small></div><div id="st" style="font-size:11px;color:#f4a261;font-family:monospace">● Connecting...</div></header><div class="container"><div class="nb"><h3>📡 Network Access — other devices on same WiFi</h3><div class="chip" id="ip">Finding IP...</div> <small style="color:#5a6070;font-size:11px">Open on any device on same WiFi network</small></div><div class="stats"><div class="stat"><div class="num" id="s1">—</div><div class="lbl">Total</div></div><div class="stat"><div class="num" style="color:#f4a261" id="s2">—</div><div class="lbl">Pending</div></div><div class="stat"><div class="num" style="color:#2ec4b6" id="s3">—</div><div class="lbl">Approved</div></div><div class="stat"><div class="num" style="color:#e63946" id="s4">—</div><div class="lbl">Rejected</div></div></div><div class="section"><div class="sh"><span>👥 Users <span id="uc" style="color:#4895ef;font-size:12px"></span></span><button class="btn" onclick="load()">↻ Refresh</button></div><div class="tw"><table><thead><tr><th>ID</th><th>Full Name</th><th>Username</th><th>PIN</th></tr></thead><tbody id="ut"><tr><td colspan="4" class="mid">Loading...</td></tr></tbody></table></div></div><div class="section"><div class="sh"><span>📋 Reports <span id="rc" style="color:#4895ef;font-size:12px"></span></span><select id="fs" onchange="load()" style="background:#181c24;border:1px solid #1e2330;color:#e8eaf0;padding:5px 10px;border-radius:4px;font-size:11px"><option value="">All</option><option>Pending</option><option>Approved</option><option>Rejected</option></select></div><div class="tw"><table><thead><tr><th>ID</th><th>Type</th><th>Location</th><th>Filed By</th><th>Description</th><th>Status</th><th>Submitted</th></tr></thead><tbody id="rt"><tr><td colspan="7" class="mid">Loading...</td></tr></tbody></table></div></div></div><script>const API='http://localhost:3000/api';let tok=null;function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}async function init(){try{const r=await fetch(API+'/auth/admin-login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:'admin123'})});const d=await r.json();if(d.token){tok=d.token;document.getElementById('st').textContent='● Connected';document.getElementById('st').style.color='#2ec4b6';load();ip();setInterval(load,15000)}}catch(e){document.getElementById('st').textContent='● Cannot connect — is server.js running?';document.getElementById('st').style.color='#e63946';document.getElementById('ut').innerHTML='<tr><td colspan="4" class="mid" style="color:#e63946">❌ Start server.js in Termux first</td></tr>';document.getElementById('rt').innerHTML='<tr><td colspan="7" class="mid" style="color:#e63946">❌ Server not running</td></tr>'}}function ip(){try{const pc=new RTCPeerConnection({iceServers:[]});pc.createDataChannel('');pc.createOffer().then(o=>pc.setLocalDescription(o));pc.onicecandidate=e=>{if(!e||!e.candidate)return;const m=e.candidate.candidate.match(/(d+.d+.d+.d+)/);if(m&&!m[1].startsWith('127')){document.getElementById('ip').textContent=m[1]+':3000';pc.close()}}}catch(e){document.getElementById('ip').textContent='Run: ip addr show wlan0'}}async function h(path){const r=await fetch(API+path,{headers:{'Authorization':'Bearer '+tok}});return r.json()}async function load(){if(!tok)return;try{const s=await h('/reports/stats');document.getElementById('s1').textContent=s.total;document.getElementById('s2').textContent=s.pending;document.getElementById('s3').textContent=s.approved;document.getElementById('s4').textContent=s.rejected}catch(e){}try{const u=await h('/admin/users');document.getElementById('uc').textContent='('+u.length+' records)';document.getElementById('ut').innerHTML=u.length?u.map(u=>'<tr><td class="idc">#'+u.id+'</td><td><strong>'+esc(u.name)+'</strong></td><td style="font-family:monospace;color:#4895ef">@'+esc(u.username)+'</td><td>'+(u.pin?'<span style="color:#2ec4b6">✓ Yes</span>':'<span style="color:#5a6070">No</span>')+'</td></tr>').join(''):'<tr><td colspan="4" class="mid">No users yet</td></tr>'}catch(e){document.getElementById('ut').innerHTML='<tr><td colspan="4" class="mid" style="color:#e63946">Failed to load users</td></tr>'}try{const st=document.getElementById('fs').value;const reps=await h('/reports'+(st?'?status='+st:''));document.getElementById('rc').textContent='('+reps.length+' records)';document.getElementById('rt').innerHTML=reps.length?reps.map(r=>'<tr><td class="idc">'+r.id+'</td><td><strong>'+esc(r.type)+'</strong></td><td style="font-size:12px">'+esc(r.location)+'</td><td style="font-family:monospace;font-size:12px;color:#4895ef">@'+esc(r.username)+'</td><td class="dc" title="'+esc(r.description)+'">'+esc(r.description)+'</td><td><span class="badge b'+r.status[0].toLowerCase()+'">'+r.status+'</span></td><td style="color:#5a6070;font-size:12px">'+esc(r.submitted)+'</td></tr>').join(''):'<tr><td colspan="7" class="mid">No reports found</td></tr>'}catch(e){document.getElementById('rt').innerHTML='<tr><td colspan="7" class="mid" style="color:#e63946">Failed to load</td></tr>'}}init();</script></body></html>
